<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror.ai | The Voice from the Void</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .gemini-font { font-family: 'Montserrat', sans-serif; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        
        /* Code block precise styling */
        .code-block {
            background: #1e1e1e !important;
            border: 1px solid #333 !important;
            border-radius: 8px !important;
            margin: 16px 0 !important;
        }
        
        .code-block-header {
            background: #252526 !important;
            border-bottom: 1px solid #333 !important;
            padding: 8px 12px !important;
        }
        
        .code-block-language {
            color: #cccccc !important;
            font-size: 12px !important;
            font-weight: 500 !important;
        }
        
        .code-copy-btn {
            color: #858585 !important;
            background: transparent !important;
            border: none !important;
            padding: 4px !important;
        }
        
        .code-copy-btn:hover {
            color: #ffffff !important;
            background: rgba(255, 255, 255, 0.1) !important;
        }
        
        .code-block-body {
            background: #1e1e1e !important;
            color: #d4d4d4 !important;
            padding: 12px 16px !important;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important;
            font-size: 14px !important;
            line-height: 1.5 !important;
            border: none !important;
        }
    </style>
</head>
<body class="bg-[#0f0f12] text-[#e2e2e6] min-h-screen flex flex-col items-center justify-center">

    <!-- API Modal -->
    <div id="api-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#16161a] border border-[#2d2d35] p-8 rounded-2xl max-w-md w-full text-center shadow-2xl">
            <h2 class="gemini-font text-3xl mb-4 font-bold text-[#e2e2e6]">API Settings</h2>
            <p class="text-gray-400 mb-6 text-sm">Generate a free key for Abyss-level performance.</p>
            <div id="api-result" class="hidden mb-6 p-4 bg-[#212129] border border-[#2d2d35] rounded-xl select-all font-mono text-[#a87ffb] break-all"></div>
            <button onclick="generateAPIKey()" id="gen-btn" class="w-full bg-[#a87ffb] hover:bg-[#9060eb] text-black font-bold py-3 rounded-xl transition-all text-lg mb-4">Generate Key</button>
            <button onclick="closeModal()" class="text-gray-500 hover:text-gray-300 text-sm font-medium">Close</button>
        </div>
    </div>

    <!-- Floating API Button -->
    <button onclick="openModal()" class="fixed left-6 bottom-6 bg-[#212129] text-[#a87ffb] px-6 py-3 rounded-full font-bold shadow-lg hover:bg-[#2d2d35] transition-all z-40 border border-[#2d2d35]">
        Get API Access
    </button>

    <div class="flex w-full h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-72 flex flex-col shadow-sm border-r border-[#2d2d35]">
            <div class="p-6">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-[#212129] hover:bg-[#2d2d35] text-[#e2e2e6] font-medium py-3 px-4 rounded-full transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
            </div>
            <div class="px-6 py-2 text-xs font-bold text-gray-500 uppercase tracking-widest">Recent</div>
            <div id="history-list" class="flex-1 overflow-y-auto space-y-1"></div>
        </aside>

        <!-- Main Chat Area -->
        <main class="flex-1 flex flex-col bg-[#0f0f12]">
            <header class="p-4 flex justify-center border-b border-[#2d2d35]">
                <h1 class="gemini-font text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-[#a87ffb] to-[#7f5fff]">Horror.ai</h1>
            </header>

            <div class="flex-1 flex flex-col relative overflow-hidden max-w-4xl mx-auto w-full">
                <div id="chat-box" class="flex-1 overflow-y-auto p-8 space-y-8">
                    <!-- Messages will be injected here -->
                </div>
                
                <!-- Input Area -->
                <div class="p-6">
                    <div class="input-container flex items-center px-6 py-2 gap-4 border border-[#2d2d35]">
                        <input type="text" id="user-input" placeholder="Ask Horror.ai..." class="flex-1 py-3 bg-transparent text-[#e2e2e6] placeholder-gray-500 focus:outline-none text-lg">
                        <button onclick="sendMessage()" class="bg-[#a87ffb] hover:bg-[#9060eb] text-black font-bold py-2 px-6 rounded-xl transition-all">Send</button>
                    </div>
                    <p class="text-center text-[10px] text-gray-500 mt-4">Horror.ai can make mistakes. Verify important info.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
