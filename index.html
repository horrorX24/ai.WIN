<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror.ai | The Void</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f12; color: #e2e2e6; font-family: sans-serif; overflow: hidden; }
        .hidden { display: none !important; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="auth-overlay" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4">
        <div class="bg-[#16161a] border border-[#2d2d35] p-8 rounded-2xl w-full max-w-md shadow-2xl text-center">
            <h1 class="text-3xl font-bold text-[#a87ffb] mb-6">Horror.ai</h1>
            
            <div id="auth-form">
                <p class="text-sm text-gray-400 mb-6">Enter your Gmail. An entry link will be sent to your inbox.</p>
                <input type="email" id="user-email" placeholder="name@gmail.com" 
                       class="w-full bg-[#0f0f12] border border-[#2d2d35] p-4 rounded-xl outline-none focus:border-[#a87ffb] mb-4 text-center text-white">
                <button id="send-link-btn" class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition-all">
                    Send Link to Gmail
                </button>
            </div>

            <div id="verifying-status" class="hidden py-4">
                <p class="animate-pulse text-[#a87ffb] font-bold text-xl uppercase tracking-widest">Verifying Identity...</p>
                <p class="text-xs text-gray-500 mt-2">Connecting to the void via Firebase</p>
            </div>
        </div>
    </div>

    <header class="p-4 border-b border-[#2d2d35] flex justify-between items-center bg-[#16161a]">
        <span class="font-bold text-[#a87ffb] text-xl">Horror.ai</span>
        <button onclick="auth.signOut().then(() => location.reload())" class="text-xs text-gray-500 hover:text-white">Sign Out</button>
    </header>

    <main class="flex-1 flex flex-col max-w-4xl mx-auto w-full overflow-hidden">
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div class="bg-[#16161a] border border-[#2d2d35] px-4 py-2 rounded-xl max-w-sm">Welcome back. The void has missed you.</div>
        </div>
        <div class="p-6">
            <div class="flex gap-4 bg-[#16161a] border border-[#2d2d35] p-2 rounded-2xl shadow-inner">
                <input type="text" id="chat-input" placeholder="Type a message..." class="flex-1 bg-transparent px-4 text-white outline-none">
                <button id="chat-send" class="bg-[#a87ffb] text-black px-6 py-2 rounded-xl font-bold hover:bg-[#9060eb] transition-all">Send</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your Config
        const firebaseConfig = {
            apiKey: "AIzaSyDzlC2q7dypspwzhs6RpbpFOevPDpV_dMQ",
            authDomain: "ai-win-ww.firebaseapp.com",
            projectId: "ai-win-ww",
            storageBucket: "ai-win-ww.firebasestorage.app",
            messagingSenderId: "786869083355",
            appId: "1:786869083355:web:7532d9c4d0365a445300fe",
            measurementId: "G-YX2YG2WRH2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.auth = auth; // Global access for logout button

        // 1. Monitor Login Status
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-overlay').classList.add('hidden');
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
            }
        });

        // 2. Send Magic Link
        document.getElementById('send-link-btn').onclick = async () => {
            const email = document.getElementById('user-email').value;
            const btn = document.getElementById('send-link-btn');
            
            if(!email.includes('@')) return alert("Enter a valid Gmail.");

            const actionCodeSettings = {
                url: window.location.href, // Link brings user back here
                handleCodeInApp: true,
            };

            try {
                btn.innerText = "SENDING LINK...";
                btn.disabled = true;
                await sendSignInLinkToEmail(auth, email, actionCodeSettings);
                window.localStorage.setItem('emailForSignIn', email);
                alert('Magic link sent to ' + email + '! Open Gmail on this device to enter.');
            } catch (error) {
                alert('Firebase Error: ' + error.message);
                btn.innerText = "Send Link to Gmail";
                btn.disabled = false;
            }
        };

        // 3. Handle Coming Back from the Link
        if (isSignInWithEmailLink(auth, window.location.href)) {
            document.getElementById('auth-form').classList.add('hidden');
            document.getElementById('verifying-status').classList.remove('hidden');

            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) email = window.prompt('Please confirm your email:');

            signInWithEmailLink(auth, email, window.location.href)
                .then(() => {
                    window.localStorage.removeItem('emailForSignIn');
                    document.getElementById('auth-overlay').classList.add('hidden');
                })
                .catch((err) => {
                    alert('Login failed: ' + err.message);
                    location.href = "/"; // Reset on fail
                });
        }

        // 4. Chat UI Logic
        const box = document.getElementById('chat-box');
        const input = document.getElementById('chat-input');
        
        function addMessage(text, isUser = false) {
            const align = isUser ? 'justify-end' : 'justify-start';
            const bg = isUser ? 'bg-[#a87ffb] text-black' : 'bg-[#16161a] border border-[#2d2d35] text-white';
            box.innerHTML += `<div class="flex ${align} animate-fade-in"><div class="${bg} px-4 py-2 rounded-xl max-w-xs shadow-lg">${text}</div></div>`;
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('chat-send').onclick = () => {
            if(!input.value.trim()) return;
            addMessage(input.value, true);
            input.value = "";
        };
        input.onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('chat-send').click(); };
    </script>
</body>
</html>
