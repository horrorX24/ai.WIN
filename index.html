<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror.ai | The Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f12; color: #e2e2e6; font-family: sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div id="auth-container" class="bg-[#16161a] border border-[#2d2d35] p-8 rounded-3xl w-full max-w-sm">
        <h1 class="text-3xl font-bold text-[#a87ffb] mb-6 text-center">Horror.ai</h1>
        <input type="text" id="username" placeholder="Username" class="w-full bg-[#0f0f12] border border-[#2d2d35] p-3 rounded-xl mb-4 outline-none">
        <input type="password" id="password" placeholder="Password" class="w-full bg-[#0f0f12] border border-[#2d2d35] p-3 rounded-xl mb-6 outline-none">
        <button onclick="handleAuth('login')" class="w-full bg-white text-black font-bold py-3 rounded-xl mb-2">Login</button>
        <button onclick="handleAuth('signup')" class="w-full text-[#a87ffb] text-sm">Create Account</button>
    </div>

    <div id="main-interface" class="hidden fixed inset-0 flex flex-col p-6">
        <div id="chat-box" class="flex-1 overflow-y-auto mb-4 space-y-4 p-4"></div>
        <div class="flex gap-2">
            <input type="text" id="user-input" class="flex-1 bg-[#16161a] border border-[#2d2d35] p-4 rounded-xl outline-none">
            <button onclick="sendMessage()" class="bg-[#a87ffb] px-6 rounded-xl text-black font-bold">Send</button>
        </div>
    </div>

    <script>
        async function handleAuth(type) {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch(`/api/auth/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            if (res.ok) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('main-interface').classList.remove('hidden');
            } else { alert("Access Denied"); }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const msg = input.value;
            if(!msg) return;
            box.innerHTML += `<div class="text-right"><b>You:</b> ${msg}</div>`;
            input.value = "";
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            box.innerHTML += `<div class="text-left text-[#a87ffb]"><b>Horror:</b> ${data.reply}</div>`;
        }
    </script>
</body>
</html>
