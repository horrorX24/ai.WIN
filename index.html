<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror.ai | Secured</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050507; color: #e2e2e6; font-family: 'Courier New', Courier, monospace; }
        .hidden { display: none !important; }
        .glow:focus { box-shadow: 0 0 10px #a87ffb; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-[#0c0c10] border-2 border-[#1a1a24] p-10 rounded-3xl w-full max-w-sm shadow-[0_0_50px_rgba(0,0,0,1)] fade-in">
        <h1 class="text-5xl font-black text-[#a87ffb] mb-1 text-center tracking-tighter italic">Horror.ai</h1>
        <p class="text-[9px] text-gray-600 text-center mb-10 tracking-[0.3em] font-bold">DATABASE ENCRYPTED</p>

        <div id="auth-box" class="space-y-5">
            <div>
                <input type="text" id="username" placeholder="IDENTITY NAME" 
                       class="w-full bg-[#050507] border border-[#2d2d35] p-4 rounded-xl outline-none glow text-[#a87ffb] placeholder-gray-700">
            </div>
            
            <div>
                <input type="password" id="password" placeholder="SECURITY PHRASE" 
                       class="w-full bg-[#050507] border border-[#2d2d35] p-4 rounded-xl outline-none glow text-[#a87ffb] placeholder-gray-700">
            </div>
            
            <div class="pt-4 flex flex-col gap-4">
                <button onclick="handleAuth('login')" 
                        class="w-full bg-[#a87ffb] text-black font-black py-4 rounded-xl hover:bg-[#c4a6ff] transition-all transform active:scale-95">
                    ACCESS PORTAL
                </button>
                <button onclick="handleAuth('signup')" 
                        class="w-full bg-transparent border border-[#2d2d35] text-gray-500 font-bold py-3 rounded-xl hover:border-[#a87ffb] hover:text-[#a87ffb] transition-all text-sm">
                    CREATE NEW SOUL
                </button>
            </div>
        </div>

        <div id="welcome-box" class="hidden text-center py-12 fade-in">
            <div class="text-6xl mb-6">👁️</div>
            <p class="text-[#a87ffb] font-bold text-2xl mb-2">ACCESS GRANTED.</p>
            <p class="text-gray-500 text-xs mb-10">THE VOID HAS RECOGNIZED YOU.</p>
            <button onclick="location.reload()" class="text-xs text-gray-700 hover:text-red-500 underline uppercase tracking-widest">Sever Connection</button>
        </div>
    </div>

    <script>
        async function handleAuth(type) {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(!user || !pass) return alert("MISSING DATA");

            try {
                const response = await fetch(`/api/auth/${type}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('auth-box').classList.add('hidden');
                    document.getElementById('welcome-box').classList.remove('hidden');
                } else {
                    alert("DENIED: " + data.error);
                }
            } catch (err) {
                alert("VOID OFFLINE: CHECK RAILWAY LOGS");
            }
        }
    </script>
</body>
</html>
