<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror.ai | The Voice from the Void</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .gemini-font { font-family: 'Montserrat', sans-serif; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .tab-active { background: #212129; color: #a87ffb; border-left: 4px solid #a87ffb; }
        .hidden { display: none !important; }
        body { background-color: #0f0f12; color: #e2e2e6; }
        
        /* Toggle Switch Styling */
        .toggle-btn { transition: all 0.3s ease; }
        .toggle-active { background-color: #a87ffb; color: black; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="settings-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-50 p-4">
        <div class="bg-[#16161a] border border-[#2d2d35] rounded-2xl max-w-3xl w-full flex overflow-hidden shadow-2xl min-h-[450px]">
            
            <div class="w-1/3 bg-[#0f0f12] border-r border-[#2d2d35] flex flex-col py-4">
                <h2 class="gemini-font text-xl font-bold text-[#e2e2e6] px-6 mb-6">Settings</h2>
                <button onclick="switchTab('account')" id="tab-account" class="tab-btn tab-active flex items-center gap-3 px-6 py-4 text-sm font-bold transition-all text-left">
                    Account & Auth
                </button>
                <button onclick="switchTab('personalization')" id="tab-personalization" class="tab-btn flex items-center gap-3 px-6 py-4 text-gray-400 hover:text-white text-sm font-bold transition-all text-left border-l-2 border-transparent">
                    Personalization
                </button>
                <div class="mt-auto px-4">
                    <button onclick="closeSettings()" class="w-full py-2 text-gray-500 hover:text-gray-300 text-sm font-medium">Close Panel</button>
                </div>
            </div>

            <div class="w-2/3 p-8">
                
                <div id="content-account" class="tab-content space-y-6">
                    <h3 class="text-lg font-bold text-white mb-2">Access the Void</h3>
                    
                    <div id="otp-input-phase">
                        <div class="flex bg-[#0f0f12] p-1 rounded-xl mb-6 border border-[#2d2d35]">
                            <button id="btn-email" onclick="setMethod('email')" class="toggle-btn flex-1 py-2 rounded-lg text-sm font-bold toggle-active">Email</button>
                            <button id="btn-phone" onclick="setMethod('phone')" class="toggle-btn flex-1 py-2 rounded-lg text-sm font-bold text-gray-400">Phone</button>
                        </div>

                        <div class="space-y-4">
                            <div id="phone-fields" class="hidden flex gap-2">
                                <select id="otp-country" class="bg-[#212129] border border-[#2d2d35] rounded-xl px-2 text-white outline-none">
                                    <option value="+91">🇮🇳 +91</option>
                                    <option value="+1">🇺🇸 +1</option>
                                </select>
                                <input type="text" id="otp-phone" placeholder="Phone Number" class="flex-1 bg-[#212129] border border-[#2d2d35] rounded-xl p-3 text-sm">
                            </div>

                            <div id="email-fields">
                                <input type="email" id="otp-email" placeholder="void@example.com" class="w-full bg-[#212129] border border-[#2d2d35] rounded-xl p-3 text-sm focus:outline-none">
                            </div>
                        </div>

                        <button onclick="requestOTP()" id="otp-req-btn" class="w-full mt-6 bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition-all">
                            Send Access Code
                        </button>
                    </div>

                    <div id="otp-verify-phase" class="hidden text-center">
                        <p class="text-sm text-gray-400 mb-4">Code sent to your <span id="display-target">email</span></p>
                        <input type="text" id="otp-code" maxlength="6" placeholder="000000" class="w-full bg-[#212129] border border-[#2d2d35] rounded-xl p-4 text-center text-3xl tracking-[0.5em] mb-4 focus:border-[#a87ffb] outline-none">
                        <button id="verify-btn" onclick="verifyOTP()" class="w-full bg-[#a87ffb] text-black font-bold py-3 rounded-xl hover:bg-[#9060eb]">
                            Verify Identity
                        </button>
                    </div>
                </div>

                <div id="content-personalization" class="tab-content hidden space-y-6">
                    <h3 class="text-lg font-bold text-white mb-2">AI Behavior</h3>
                    <textarea id="system-prompt" rows="4" class="w-full bg-[#212129] border border-[#2d2d35] rounded-xl p-4 text-sm" placeholder="E.g. Speak like a Victorian ghost..."></textarea>
                    <button onclick="saveSettings()" class="bg-[#a87ffb] text-black font-bold py-2 px-6 rounded-xl w-full">Save Persona</button>
                </div>
            </div>
        </div>
    </div>

    <div class="flex w-full h-screen overflow-hidden">
        <aside class="w-72 flex flex-col border-r border-[#2d2d35] bg-[#0f0f12]">
            <div class="p-6">
                <button onclick="location.reload()" class="w-full bg-[#212129] text-[#e2e2e6] font-medium py-3 rounded-full border border-[#2d2d35]">New Chat</button>
            </div>
            <div class="flex-1"></div>
            <div class="p-4 border-t border-[#2d2d35]">
                <button onclick="openSettings()" class="w-full text-gray-400 hover:text-white px-4 py-3 text-left">Settings & Account</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="p-4 border-b border-[#2d2d35] text-center">
                <h1 class="gemini-font text-2xl font-bold text-[#a87ffb]">Horror.ai</h1>
            </header>
            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-8"></div>
            <div class="p-6">
                <div class="flex items-center px-6 py-2 gap-4 border border-[#2d2d35] rounded-2xl bg-[#16161a]">
                    <input type="text" id="user-input" placeholder="Type a message..." class="flex-1 py-3 bg-transparent text-white outline-none">
                    <button onclick="sendMessage()" class="bg-[#a87ffb] text-black font-bold py-2 px-6 rounded-xl">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentMethod = 'email';
        let finalTarget = '';

        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); document.getElementById('settings-modal').classList.add('flex'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); document.getElementById('settings-modal').classList.remove('flex'); }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
        }

        function setMethod(method) {
            currentMethod = method;
            const isEmail = method === 'email';
            document.getElementById('email-fields').classList.toggle('hidden', !isEmail);
            document.getElementById('phone-fields').classList.toggle('hidden', isEmail);
            document.getElementById('btn-email').classList.toggle('toggle-active', isEmail);
            document.getElementById('btn-phone').classList.toggle('toggle-active', !isEmail);
            document.getElementById('btn-email').classList.toggle('text-gray-400', !isEmail);
            document.getElementById('btn-phone').classList.toggle('text-gray-400', isEmail);
        }

        async function requestOTP() {
            const btn = document.getElementById('otp-req-btn');
            const email = document.getElementById('otp-email').value;
            const phone = document.getElementById('otp-phone').value;
            const country = document.getElementById('otp-country').value;
            
            finalTarget = currentMethod === 'email' ? email : country + phone;
            if(!finalTarget || finalTarget.length < 5) return alert("Please enter valid contact details.");

            btn.innerText = "Channelling...";
            btn.disabled = true;

            const ua = navigator.userAgent.toLowerCase();
            const device = ua.includes("android") ? "android" : (ua.includes("iphone") ? "ios" : "desktop");

            try {
                const res = await fetch('/api/otp/request', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contact: finalTarget, 
                        method: currentMethod,
                        device: device
                    })
                });
                if (res.ok) {
                    document.getElementById('display-target').innerText = currentMethod;
                    document.getElementById('otp-input-phase').classList.add('hidden');
                    document.getElementById('otp-verify-phase').classList.remove('hidden');
                }
            } catch(e) { alert("The void is silent. Try again."); }
            finally { btn.innerText = "Send Access Code"; btn.disabled = false; }
        }

        async function verifyOTP() {
            const code = document.getElementById('otp-code').value;
            const btn = document.getElementById('verify-btn');
            if(code.length < 6) return;

            btn.innerText = "Verifying...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/otp/verify', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ target: finalTarget, code: code })
                });
                const data = await res.json();
                
                if (data.success) {
                    btn.innerText = "Access Granted";
                    setTimeout(() => location.reload(), 1000);
                } else {
                    alert("Incorrect code.");
                    btn.innerText = "Verify Identity";
                    btn.disabled = false;
                }
            } catch(e) { 
                btn.innerText = "Verify Identity"; 
                btn.disabled = false; 
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            chatBox.innerHTML += `<div class="flex justify-end"><div class="bg-[#a87ffb] text-black px-4 py-2 rounded-xl">${input.value}</div></div>`;
            const text = input.value;
            input.value = "";

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await res.json();
            chatBox.innerHTML += `<div class="flex justify-start"><div class="bg-[#16161a] border border-[#2d2d35] px-4 py-2 rounded-xl">${data.reply}</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
