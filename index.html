<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f12; color: #e2e2e6; font-family: sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-[#16161a] border border-[#2d2d35] p-8 rounded-2xl w-full max-w-md shadow-2xl">
        <h1 class="text-2xl font-bold text-[#a87ffb] mb-6 text-center">Horror.ai</h1>

        <div id="auth-ui">
            <p class="text-sm text-gray-400 mb-4 text-center">Enter your Gmail. We will send an entry link directly to your inbox.</p>
            <input type="email" id="email" placeholder="yourname@gmail.com" 
                   class="w-full bg-[#0f0f12] border border-[#2d2d35] p-3 rounded-xl outline-none focus:border-[#a87ffb] mb-4">
            <button id="send-btn" class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition-all">
                Send Link to Gmail
            </button>
        </div>

        <div id="loading-ui" class="hidden text-center py-10">
            <p class="animate-pulse text-[#a87ffb] font-bold">VERIFYING IDENTITY...</p>
            <p class="text-xs text-gray-500 mt-2">Connecting to the void via Firebase</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // TODO: REPLACE THESE WITH YOUR KEYS FROM FIREBASE SETTINGS
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "ai-win-ww.firebaseapp.com",
            projectId: "ai-win-ww",
            storageBucket: "ai-win-ww.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- 1. SEND LINK ---
        document.getElementById('send-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const btn = document.getElementById('send-btn');
            
            const actionCodeSettings = {
                url: window.location.href, // This brings them back to this same page
                handleCodeInApp: true,
            };

            try {
                btn.innerText = "SENDING...";
                btn.disabled = true;
                await sendSignInLinkToEmail(auth, email, actionCodeSettings);
                window.localStorage.setItem('emailForSignIn', email);
                alert('Link sent! Open Gmail on this device and click the link.');
            } catch (error) {
                alert('Error: ' + error.message);
                btn.innerText = "Send Link to Gmail";
                btn.disabled = false;
            }
        };

        // --- 2. CATCH THE RETURNING USER ---
        if (isSignInWithEmailLink(auth, window.location.href)) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('loading-ui').classList.remove('hidden');

            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) {
                email = window.prompt('Please confirm your email:');
            }

            signInWithEmailLink(auth, email, window.location.href)
                .then(() => {
                    window.localStorage.removeItem('emailForSignIn');
                    alert('Access Granted. Welcome.');
                    // You can add logic here to show the chat interface
                })
                .catch((error) => alert('Verification failed: ' + error.message));
        }
    </script>
</body>
</html>
