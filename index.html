<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror.ai | The Void</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050507; color: #e2e2e6; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .hidden { display: none !important; }
        .glow:focus { box-shadow: 0 0 10px #a87ffb; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #1a1a24; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div id="auth-container" class="bg-[#0c0c10] border-2 border-[#1a1a24] p-10 rounded-3xl w-full max-w-sm shadow-2xl fade-in z-50">
        <h1 class="text-5xl font-black text-[#a87ffb] mb-1 text-center tracking-tighter italic">Horror.ai</h1>
        <p class="text-[9px] text-gray-600 text-center mb-10 tracking-[0.3em] font-bold">DATABASE ENCRYPTED</p>

        <div id="auth-box" class="space-y-5">
            <input type="text" id="username" placeholder="IDENTITY NAME" class="w-full bg-[#050507] border border-[#2d2d35] p-4 rounded-xl outline-none glow text-[#a87ffb] placeholder-gray-700">
            <input type="password" id="password" placeholder="SECURITY PHRASE" class="w-full bg-[#050507] border border-[#2d2d35] p-4 rounded-xl outline-none glow text-[#a87ffb] placeholder-gray-700">
            <div class="pt-4 flex flex-col gap-4">
                <button onclick="handleAuth('login')" class="w-full bg-[#a87ffb] text-black font-black py-4 rounded-xl hover:bg-[#c4a6ff] transition-all">ACCESS PORTAL</button>
                <button onclick="handleAuth('signup')" class="w-full bg-transparent border border-[#2d2d35] text-gray-500 font-bold py-3 rounded-xl hover:text-[#a87ffb]">CREATE NEW SOUL</button>
            </div>
        </div>
    </div>

    <div id="main-interface" class="hidden fixed inset-0 flex flex-col fade-in">
        <header class="p-4 border-b border-[#1a1a24] flex justify-between items-center bg-[#0c0c10]">
            <span class="font-black text-[#a87ffb] text-xl italic">Horror.ai</span>
            <div class="flex gap-4">
                <button onclick="toggleSettings()" class="text-gray-500 hover:text-white text-xs uppercase tracking-widest">Settings</button>
                <button onclick="location.reload()" class="text-gray-700 hover:text-red-500 text-xs uppercase tracking-widest">Sever</button>
            </div>
        </header>

        <main class="flex-1 flex flex-col max-w-4xl mx-auto w-full overflow-hidden">
            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 font-mono">
                <div class="text-[#a87ffb] opacity-50 text-xs">-- CONNECTION ESTABLISHED --</div>
            </div>
            <div class="p-6">
                <div class="flex gap-4 bg-[#0c0c10] border border-[#1a1a24] p-2 rounded-2xl">
                    <input type="text" id="chat-input" placeholder="Type into the void..." class="flex-1 bg-transparent px-4 text-[#a87ffb] outline-none">
                    <button onclick="sendMessage()" class="bg-[#a87ffb] text-black px-6 py-2 rounded-xl font-black hover:bg-[#c4a6ff]">SEND</button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-panel" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[100]">
        <div class="bg-[#0c0c10] border border-[#a87ffb] p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-[#a87ffb] font-black text-2xl mb-6 italic">SYSTEM CONFIG</h2>
            <div class="space-y-6">
                <div>
                    <p class="text-[10px] text-gray-500 uppercase mb-2">Remote API Access Key</p>
                    <div class="flex flex-col gap-2">
                        <div id="api-key-display" class="bg-[#050507] border border-[#2d2d35] p-3 rounded-lg text-[10px] text-[#a87ffb] break-all font-mono">
                            No key generated.
                        </div>
                        <button onclick="generateAPIKey()" class="text-[10px] bg-[#a87ffb] text-black font-bold py-2 rounded uppercase">Generate New Key</button>
                    </div>
                </div>
            </div>
            <button onclick="toggleSettings()" class="mt-8 text-xs text-gray-600 underline w-full">Close Settings</button>
        </div>
    </div>

    <script>
        let currentUser = "";

        async function handleAuth(type) {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(!user || !pass) return alert("REQUIRED: CREDENTIALS");

            const response = await fetch(`/api/auth/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass })
            });

            if (response.ok) {
                currentUser = user;
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('main-interface').classList.remove('hidden');
            } else {
                const data = await response.json();
                alert("DENIED: " + data.error);
            }
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const box = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            box.innerHTML += `<div class="flex justify-end"><div class="bg-[#a87ffb] text-black px-4 py-2 rounded-xl text-sm font-bold max-w-xs">${input.value}</div></div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;
        }

        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('hidden');
        }

        function generateAPIKey() {
            const hex = () => Math.floor(Math.random() * 0xffff).toString(16).padStart(4, '0');
            // Format: horror-####-####-####-####-####-####-####-####-####-####-#### (11 blocks)
            const key = "horror-" + Array.from({length: 11}, hex).join('-');
            document.getElementById('api-key-display').innerText = key;
        }
    </script>
</body>
</html>
